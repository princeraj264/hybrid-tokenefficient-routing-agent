name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'agent/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ghcr.io/princeraj264/hybrid-tokenefficient-routing-agent:latest